baseURL: "https://wotan.blog/"
languageCode: "cs" 
title: Nibelung
description: "Tato je stránka od Wotana"
pagination.pagerSize: 12 
theme: PaperMod
paginage: 6

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
pluralizeListTitles: false

minify:
  disableXML: true
  minifyOutput: true

# https://adityatelange.github.io/hugo-PaperMod/posts/papermod/papermod-variables/
# https://github.com/jesse-wei/jessewei.dev-PaperMod/blob/main/config.yml
params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Nibelung 
  description: "Tato je stránka od Wotana"
  keywords: ["Blog","Opera","Koncert"]
  author: "RB" # author: ["Me", "You"] # multiple authors
  images: ["images/hans-hotter-wotan-walkure-1955.jpg"] # this must be like this
  DateFormat: "Mon January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShareButtons: ["facebook","whatsapp"]
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideFooter: true
  hideSummary: false
  ShowToc: true
  TocOpen: true
  # New, from PaperModX
  TocSide: left
  ShowAllPagesInArchive: true

  mainSections:
    - posts
    - opera
    - koncerty

  assets:
    disableHLJS: true # to disable highlight.js
    disableFingerprinting: true
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"

  # Logo and name shown on top left of site
  label:
    text: "domů (walhalla)"
    icon: "/images/wotan.svg"
    iconHeight: 35

  # profile-mode 
  # modified in:
  # /home/radim/Dropbox/Music/wotan/layouts/partials/index_profile.html
  profileMode:
    enabled: true # needs to be explicitly set
    title: "nibelung.net"
    subtitle: "Tady je Wotanovo království je" 
    imageURL: "/images/hans-hotter-wotan-walkure-1955.jpg"
    imageHeight: 140
    imageWidth: 100
    imageTitle: "Wotan" 
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags
      - name: Archive 
        url: archive

  # home-info mode
  homeInfoParams:
    Title: "Wotan" # \U0001F44B"
    imageURL: "/images/hans-hotter-wotan-walkure-1955.jpg"
    Content: |
      Tady je Wotanovo království, aha 

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"

  cover:
    linkFullImages: true
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page

  editPost:
    URL: false # "https://github.com/<path_to_repo>/content"
    Text: false # "Suggest Changes" # edit text
    appendFilePath: false # true # to append file path to Edit link

  # for search https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - JSON # necessary for search
    - RSS

menu:
  main:
    - identifier: categories
      name: kategorie
      url: /categories/
      weight: 10
    - identifier: tags
      name: témata 
      url: /tags/
      weight: 20
    - identifier: program
      name: program 
      url: /program/
      weight: 25 
    - identifier: opera
      name: opera 
      url: /opera/
      weight: 30 
    - identifier: koncerty
      name: koncerty 
      url: /koncerty/
      weight: 40
    - identifier: odkazy
      name: odkazy
      url: /odkazy/
      weight: 50
    - identifier: about
      name: kontakt
      url: /about/
      weight: 70
    - identifier: search
      name: hledání
      url: /search/
      weight: 80
    - identifier: archive
      name: archiv
      url: /archives/
      weight: 90

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  tableOfContents:
    # Without this, Hugo ToC doesn't show h4 and higher
    # https://github.com/alex-shpak/hugo-book/issues/52
    endLevel: 6

  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    hl_Lines: ""
    hl_inline: false
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true # false means use external CSS file
    noClasses: false
    noHl: false
    # style: monokai
    tabWidth: 4
